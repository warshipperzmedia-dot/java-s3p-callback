# S3P Callback Server - Default Configuration
# This configuration is for local development

# Application settings
spring.application.name=s3p-callback-server
server.port=8080
server.servlet.context-path=/

# Database configuration for local development (H2)
spring.datasource.url=jdbc:h2:mem:callbackdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (only for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging configuration
logging.level.root=INFO
logging.level.com.maviance.s3p.callback=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Jackson configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true

# Error handling
server.error.include-message=always
server.error.include-stacktrace=on_param
