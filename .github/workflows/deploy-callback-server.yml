name: Deploy Callback Server to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main
      - deploy
    paths:
      - 'callback-server/**'
      - '.github/workflows/deploy-callback-server.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  EB_APP_NAME: s3p-callback-server
  EB_ENV_NAME: s3p-callback-server-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build with Maven
        working-directory: callback-server
        run: |
          mvn clean package -DskipTests=true
          echo "Build completed successfully"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create EB deployment package
        run: |
          cd callback-server
          mkdir -p deploy-package
          cp target/s3p-callback-server-1.0.0.jar deploy-package/application.jar
          cp -r .ebextensions deploy-package/
          cd deploy-package
          zip -r ../s3p-callback-server-${{ github.sha }}.zip .
          cd ..
          ls -la s3p-callback-server-${{ github.sha }}.zip

      - name: Upload package to S3
        run: |
          aws s3 cp callback-server/s3p-callback-server-${{ github.sha }}.zip \
            s3://${{ secrets.EB_BUCKET }}/s3p-callback-server-${{ github.sha }}.zip

      - name: Create EB application version
        run: |
          aws elasticbeanstalk create-app-version \
            --application-name ${{ env.EB_APP_NAME }} \
            --version-label ${{ github.sha }} \
            --source-bundle S3Bucket=${{ secrets.EB_BUCKET }},S3Key=s3p-callback-server-${{ github.sha }}.zip \
            --region ${{ env.AWS_REGION }} || true

      - name: Update EB environment
        run: |
          aws elasticbeanstalk update-environment \
            --application-name ${{ env.EB_APP_NAME }} \
            --environment-name ${{ env.EB_ENV_NAME }} \
            --version-label ${{ github.sha }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for environment to update
        run: |
          echo "Waiting for environment to update..."
          for i in {1..60}; do
            STATUS=$(aws elasticbeanstalk describe-environments \
              --application-name ${{ env.EB_APP_NAME }} \
              --environment-names ${{ env.EB_ENV_NAME }} \
              --query 'Environments[0].Status' \
              --output text)
            if [ "$STATUS" = "Ready" ]; then
              echo "Environment is ready!"
              break
            fi
            echo "Status: $STATUS - Waiting... ($i/60)"
            sleep 10
          done

      - name: Get deployment URL
        run: |
          CNAME=$(aws elasticbeanstalk describe-environments \
            --application-name ${{ env.EB_APP_NAME }} \
            --environment-names ${{ env.EB_ENV_NAME }} \
            --query 'Environments[0].CNAME' \
            --output text)
          echo "Deployment URL: http://$CNAME"
          echo "DEPLOYMENT_URL=http://$CNAME" >> $GITHUB_ENV

      - name: Health check
        run: |
          echo "Checking health endpoint..."
          for i in {1..30}; do
            HEALTH=$(curl -s http://${{ env.DEPLOYMENT_URL }}/api/v1/health | grep -q '"status":"UP"' && echo "UP" || echo "DOWN")
            if [ "$HEALTH" = "UP" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Health check attempt $i/30 - Status: $HEALTH"
            sleep 10
          done
          echo "Health check failed!"
          exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "✓ Deployment successful!"
          echo "Application URL: http://${{ env.DEPLOYMENT_URL }}"
          echo "Health Check: http://${{ env.DEPLOYMENT_URL }}/api/v1/health"
          echo "Callback Endpoint: http://${{ env.DEPLOYMENT_URL }}/api/v1/payment-callback"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "✗ Deployment failed!"
          exit 1
